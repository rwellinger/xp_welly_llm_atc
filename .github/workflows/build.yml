name: Build

on:
  pull_request:
    types: [closed]
    branches: [main]
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Rewrite SSH submodule URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Setup dependencies
        run: make setup

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ github.job }}-${{ startsWith(github.ref, 'refs/tags/v') && 'release' || 'debug' }}
          max-size: 1500M
          variant: ccache

      - name: Build
        run: |
          RELEASE_FLAG=""
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then RELEASE_FLAG="-DRELEASE=ON"; fi
          cmake -B build -DCMAKE_BUILD_TYPE=Release $RELEASE_FLAG -Wno-dev
          cmake --build build --parallel
          ccache --show-stats

      - name: Run tests
        run: make test

      - name: Stage release bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          STAGE=dist/xp_wellys_atc
          mkdir -p "$STAGE/mac_x64"
          mkdir -p "$STAGE/Resources/espeak-ng-data"
          mkdir -p "$STAGE/Resources/models"
          mkdir -p "$STAGE/data/regions/eu"
          mkdir -p "$STAGE/data/regions/us"

          cp build/xp_wellys_atc.xpl           "$STAGE/mac_x64/"
          cp build/libpiper.dylib              "$STAGE/mac_x64/"
          cp build/libonnxruntime.1.22.0.dylib "$STAGE/mac_x64/"
          cp build/libonnxruntime.dylib        "$STAGE/mac_x64/"

          for rp in $(otool -l "$STAGE/mac_x64/xp_wellys_atc.xpl" \
                      | awk '/LC_RPATH/{flag=1; next} flag && /path/ {print $2; flag=0}'); do
            install_name_tool -delete_rpath "$rp" "$STAGE/mac_x64/xp_wellys_atc.xpl" 2>/dev/null || true
          done
          install_name_tool -add_rpath "@loader_path" "$STAGE/mac_x64/xp_wellys_atc.xpl"

          codesign --force --deep --sign - "$STAGE/mac_x64/libonnxruntime.1.22.0.dylib"
          codesign --force --deep --sign - "$STAGE/mac_x64/libpiper.dylib"
          codesign --force --deep --sign - "$STAGE/mac_x64/xp_wellys_atc.xpl"

          rsync -a --delete \
            build/espeak_ng-install/share/espeak-ng-data/ \
            "$STAGE/Resources/espeak-ng-data/"

          cp data/atc_prompt_templates.json     "$STAGE/data/"
          cp data/settings.json                 "$STAGE/data/"
          cp data/regions/eu/atc_templates.json "$STAGE/data/regions/eu/"
          cp data/regions/eu/flight_rules.json  "$STAGE/data/regions/eu/"
          cp data/regions/eu/airport_vrps.json  "$STAGE/data/regions/eu/"
          cp data/regions/us/atc_templates.json "$STAGE/data/regions/us/"
          cp data/regions/us/flight_rules.json  "$STAGE/data/regions/us/"

          cp -r docs "$STAGE/docs"

          cd dist && zip -r xp_wellys_atc.zip xp_wellys_atc/

      - name: Create release with assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/xp_wellys_atc.zip
          generate_release_notes: true
